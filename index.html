<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Obscuro - IB Biology Obscure Detail Trainer</title>
<meta name="description" content="Daily IB Biology obscure detail trainer. Five questions a day on the easy-to-miss specifics.">
<meta name="theme-color" content="#1A1705">
<meta name="color-scheme" content="light">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Obscuro">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="boot" class="boot-screen">
  <svg class="boot-gear" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
    <g id="boot-gear-g"></g>
  </svg>
  <div class="boot-label">winding up</div>
</div>

<div id="modal-setup" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">START THE MACHINE</div>
    <div class="modal-sub">Daily five-question drill on the obscure 2023-syllabus details that slip through standard teaching. Named organisms, exact mechanisms, the easy-to-miss specifics that turn up in exam papers but rarely make it into class.</div>
    <label class="modal-label">Level</label>
    <div class="mode-toggle" id="setup-mode">
      <button type="button" class="mode-btn" data-mode="SL">SL only</button>
      <button type="button" class="mode-btn active" data-mode="both">SL + HL</button>
      <button type="button" class="mode-btn" data-mode="HL">HL only</button>
    </div>
    <button id="setup-submit" class="btn-primary modal-submit">START</button>
  </div>
</div>

<div id="app" class="app-frame hidden">
  <header id="top-bar" class="top-machine">
    <svg id="header-machine" width="100%" height="44" viewBox="0 0 280 44" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
    <div class="wordmark">OBSCURO</div>
  </header>

  <main id="screens">
    <section id="screen-dashboard" class="screen"></section>
    <section id="screen-question" class="screen hidden"></section>
    <section id="screen-answer" class="screen hidden"></section>
    <section id="screen-synopsis" class="screen hidden"></section>
    <section id="screen-papers" class="screen hidden"></section>
    <section id="screen-syllabus" class="screen hidden"></section>
    <section id="screen-guide" class="screen hidden"></section>
  </main>

  <nav id="bottom-nav" class="bottom-nav" aria-label="Primary">
    <button class="nav-item active" data-screen="dashboard" type="button">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="12" cy="12" r="2.4" fill="currentColor"/>
        <line x1="12" y1="1.5" x2="12" y2="4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="12" y1="19.5" x2="12" y2="22.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="1.5" y1="12" x2="4.5" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="19.5" y1="12" x2="22.5" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="4.4" y1="4.4" x2="6.6" y2="6.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="17.4" y1="17.4" x2="19.6" y2="19.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="4.4" y1="19.6" x2="6.6" y2="17.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="17.4" y1="6.6" x2="19.6" y2="4.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span>Machine</span>
    </button>
    <button class="nav-item" data-screen="papers" type="button">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 3h10l4 4v14H5V3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M15 3v4h4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <line x1="8" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="8" y1="14" x2="16" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="8" y1="17" x2="13" y2="17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span>Papers</span>
    </button>
    <button class="nav-item" data-screen="syllabus" type="button">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="4.5" cy="6" r="1.4" fill="currentColor"/>
        <circle cx="4.5" cy="12" r="1.4" fill="currentColor"/>
        <circle cx="4.5" cy="18" r="1.4" fill="currentColor"/>
        <line x1="9" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="9" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="9" y1="18" x2="16" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span>Syllabus</span>
    </button>
    <button class="nav-item" data-screen="guide" type="button">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3.5 5 C 7 4, 10 4.6, 12 6 C 14 4.6, 17 4, 20.5 5 L 20.5 19 C 17 18, 14 18.6, 12 20 C 10 18.6, 7 18, 3.5 19 Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <line x1="12" y1="6" x2="12" y2="20" stroke="currentColor" stroke-width="1.4"/>
        <line x1="6" y1="9" x2="9.5" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="6" y1="12" x2="9.5" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="14.5" y1="9" x2="18" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="14.5" y1="12" x2="18" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span>Guide</span>
    </button>
  </nav>
</div>

<script src="gears.js"></script>
<script src="store.js"></script>
<script src="screens.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
